name: CI/CD Pipeline — DeployReady

on:
  push:
    branches:
      - main
    paths:
      - 'dev-ops/DeployReady/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Run tests
        working-directory: dev-ops/DeployReady/app
        run: |
          npm install
          npm test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        working-directory: dev-ops/DeployReady
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image to GHCR
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to cloud server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker tag ghcr.io/${{ env.IMAGE_NAME }}:latest \
                       ghcr.io/${{ env.IMAGE_NAME }}:previous || true
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker stop kora-api || true
            docker rm kora-api || true
            docker run -d \
              --name kora-api \
              --restart unless-stopped \
              -p 80:3000 \
              -e PORT=3000 \
              ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            sleep 5
            curl -f http://localhost/health || exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Deploy failed — rolling back to previous image..."
            docker stop kora-api || true
            docker rm kora-api || true
            docker run -d \
              --name kora-api \
              --restart unless-stopped \
              -p 80:3000 \
              -e PORT=3000 \
              ghcr.io/${{ env.IMAGE_NAME }}:previous \
              || echo "No previous image available — rollback skipped"
