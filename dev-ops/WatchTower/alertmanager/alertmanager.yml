global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: webhook-default

  # Critical alerts get routed separately with a shorter repeat interval
  routes:
    - match:
        severity: critical
      receiver: webhook-critical
      repeat_interval: 15m

receivers:
  - name: webhook-default
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true

  - name: webhook-critical
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true

inhibit_rules:
  # Suppress warning alerts when a critical alert is already firing for the same service
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['job']
