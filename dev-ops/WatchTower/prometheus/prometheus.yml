global:
  scrape_interval: 15s       # Scrape all targets every 15 seconds
  evaluation_interval: 15s   # Evaluate alert rules every 15 seconds

# Load alert rules
rule_files:
  - /etc/prometheus/alerts.yml

# Alertmanager connection
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Scrape targets — one job per service
scrape_configs:

  - job_name: order-service
    static_configs:
      - targets: ['order-service:3001']
        labels:
          service: order-service
    metrics_path: /metrics

  - job_name: tracking-service
    static_configs:
      - targets: ['tracking-service:3002']
        labels:
          service: tracking-service
    metrics_path: /metrics

  - job_name: notification-service
    static_configs:
      - targets: ['notification-service:3003']
        labels:
          service: notification-service
    metrics_path: /metrics
